# SonarCloud Configuration for Pragma Cat Breeds
sonar.projectKey=adsi1407_PragmaCatBreeds
sonar.organization=adsi1407
sonar.projectName=Pragma Cat Breeds
sonar.projectVersion=1.0

# Modular source configuration (matching your custom structure)
sonar.sources=lib,module
sonar.tests=test

# Module-specific configuration
sonar.modules=presentation,domain,infrastructure

# Presentation Module (with BLoC tags)
presentation.sonar.projectName=Presentation Layer
presentation.sonar.sources=lib/src/presentation
presentation.sonar.tests=test/presentation
presentation.sonar.dart.coverage.reportPaths=coverage/presentation-bloc.lcov
presentation.sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/*.config.dart

# Domain Module
domain.sonar.projectName=Domain Layer
domain.sonar.sources=module/domain/lib
domain.sonar.tests=module/domain/test
domain.sonar.dart.coverage.reportPaths=module/domain/coverage/lcov.info

# Infrastructure Module  
infrastructure.sonar.projectName=Infrastructure Layer
infrastructure.sonar.sources=module/infrastructure/lib
infrastructure.sonar.tests=module/infrastructure/test
infrastructure.sonar.dart.coverage.reportPaths=module/infrastructure/coverage/lcov.info

# Global test inclusions and exclusions
sonar.test.inclusions=**/*_test.dart,**/test/**/*.dart
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/*.config.dart,**/generated/**,build/**,ios/**,android/**,web/**,windows/**,linux/**,macos/**

# Language-specific settings
sonar.dart.coverage.reportPaths=coverage/lcov.info,coverage/presentation-bloc.lcov,module/domain/coverage/lcov.info,module/infrastructure/coverage/lcov.info

# Quality Gate Configuration
sonar.qualitygate.wait=true

# Module-specific coverage thresholds (matching your custom script)
sonar.coverage.exclusions=**/*_test.dart,**/test/**/*.dart,**/*.g.dart,**/*.freezed.dart

# New Coverage Thresholds by Module
sonar.dart.coverage.domain.minimum=90
sonar.dart.coverage.infrastructure.minimum=60  
sonar.dart.coverage.presentation.bloc.minimum=50
sonar.dart.coverage.presentation.widgets.minimum=40