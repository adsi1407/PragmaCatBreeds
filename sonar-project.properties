# SonarCloud Configuration for Pragma Cat Breeds
sonar.projectKey=adsi1407_PragmaCatBreeds
sonar.organization=adsi1407
sonar.projectName=Pragma Cat Breeds
sonar.projectVersion=1.0

# Modular source configuration (matching your custom structure)
sonar.sources=lib
sonar.tests=test

# Module-specific configuration
sonar.modules=domain,infrastructure

# Presentation is analyzed as part of `lib/` (coverage generated per category in CI)
# We keep presentation-specific coverage files (presentation-bloc/widgets/pages) and
# combine them in CI into coverage/combined.lcov for Sonar to consume.

# Domain Module
domain.sonar.projectName=Domain Layer
domain.sonar.projectBaseDir=module/domain
domain.sonar.sources=lib
domain.sonar.tests=test
domain.sonar.dart.lcov.reportPaths=coverage/lcov.info

# Infrastructure Module  
infrastructure.sonar.projectName=Infrastructure Layer
infrastructure.sonar.projectBaseDir=module/infrastructure
infrastructure.sonar.sources=lib
infrastructure.sonar.tests=test
infrastructure.sonar.dart.lcov.reportPaths=coverage/lcov.info

# Global test inclusions and exclusions
sonar.test.inclusions=**/*_test.dart,**/test/**/*.dart
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/*.config.dart,**/generated/**,build/**,ios/**,android/**,web/**,windows/**,linux/**,macos/**

# Language-specific settings (use combined lcov produced by CI)
sonar.dart.lcov.reportPaths=coverage/filtered.lcov,module/domain/coverage/lcov.info,module/infrastructure/coverage/lcov.info

# Module-local LCOV paths (relative to each module's projectBaseDir)
domain.sonar.dart.lcov.reportPaths=coverage/lcov.info
infrastructure.sonar.dart.lcov.reportPaths=coverage/lcov.info

# Quality Gate Configuration
sonar.qualitygate.wait=true

# Module-specific coverage thresholds (matching your custom script)
sonar.coverage.exclusions=**/*_test.dart,**/test/**/*.dart,**/*.g.dart,**/*.freezed.dart

# New Coverage Thresholds by Module
sonar.dart.coverage.domain.minimum=90
sonar.dart.coverage.infrastructure.minimum=60  
sonar.dart.coverage.presentation.bloc.minimum=50
sonar.dart.coverage.presentation.widgets.minimum=40