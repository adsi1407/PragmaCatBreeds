name: infrastructure
description: Infrastructure layer with API clients, repositories implementations, and caching
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  domain:
    path: ../domain
  dio: ^5.4.3+1
  dio_cache_interceptor: ^3.5.0
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0
  injectable: ^2.4.1
  get_it: ^8.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.3
  drift_dev: ^2.16.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: false