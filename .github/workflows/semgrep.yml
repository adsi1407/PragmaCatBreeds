name: Semgrep scan

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
      - name: Run semgrep
        run: |
          echo "🔍 Running Semgrep with verbose logging..."
          semgrep --config ./security/semgrep/ --verbose --json --output semgrep-report.json
          echo "✅ Semgrep completed successfully"
      - name: Upload semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json
