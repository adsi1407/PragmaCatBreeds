name: Semgrep scan

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
      - name: Run semgrep
        run: |
          echo "🔍 Running Semgrep with verbose logging..."
          semgrep --config ./security/semgrep/ --verbose --json --output semgrep-report.json || SEMGREP_EXIT_CODE=$?
          echo "✅ Semgrep execution completed (exit code: ${SEMGREP_EXIT_CODE:-0})"
      - name: Check semgrep results
        if: always()
        run: |
          echo "📊 Analyzing Semgrep results..."
          if [ -f semgrep-report.json ]; then
            ERROR_COUNT=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep-report.json)
            WARNING_COUNT=$(jq '[.results[] | select(.extra.severity == "WARNING")] | length' semgrep-report.json)
            
            echo "🔍 Security scan results:"
            echo "  • ERRORS: $ERROR_COUNT (pipeline blocking)"
            echo "  • WARNINGS: $WARNING_COUNT (informational)"
            
            if [ "$ERROR_COUNT" -gt 0 ]; then
              echo "❌ Security scan failed: $ERROR_COUNT critical security issues found"
              echo "Fix all ERROR-level issues before merging"
              exit 1
            else
              echo "✅ Security scan passed: No critical security issues found"
              if [ "$WARNING_COUNT" -gt 0 ]; then
                echo "⚠️  Please review $WARNING_COUNT warning(s) in the report"
              fi
            fi
          else
            echo "❌ Semgrep report not found"
            exit 1
          fi
      - name: Upload semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json
