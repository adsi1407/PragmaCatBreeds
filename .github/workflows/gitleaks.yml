name: Secret scanning — gitleaks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 1' # weekly on Monday at 03:00 UTC

jobs:
  gitleaks-scan:
    name: Run gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go (required for gitleaks cli build)
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Install gitleaks
        run: |
          # Install latest gitleaks from releases
          GITLEAKS_VERSION="v8.13.2"
          wget -qO- "https://github.com/zricethezav/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION#v}_linux_x86_64.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks (exit non-zero on findings)
        id: gitleaks
        run: |
          # Use a baseline file if present to reduce false positives
          BASELINE=".gitleaks.baseline.json"
          if [ -f "$BASELINE" ]; then
            gitleaks detect --source . --report-format json --report-path gitleaks-report.json --baseline-path $BASELINE
          else
            gitleaks detect --source . --report-format json --report-path gitleaks-report.json
          fi

      - name: Detect sensitive key files (p12/pfx/jks/keystore/mobileprovision/pem/key)
        id: detect-keys
        run: |
          set -e
          echo "Looking for sensitive key files (extensions: .p12 .pfx .jks .keystore .mobileprovision .pem .key)"
          # find files with these extensions, ignoring common build folders
          matches=$(git ls-files | grep -Ei '\.(p12|pfx|jks|keystore|mobileprovision|pem|key)$' || true)
          if [ -n "$matches" ]; then
            echo "Sensitive key files detected:" >&2
            echo "$matches" >&2
            echo "For your safety, do NOT commit key material. Consider adding these files to .gitignore or moving them to a secure secrets store." >&2
            exit 1
          else
            echo "No sensitive key files found."
          fi

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

      - name: Fail if secrets detected
        if: steps.gitleaks.outcome == 'failure' || (steps.gitleaks.conclusion == 'failure')
        run: |
          echo "gitleaks detected potential secrets. See gitleaks-report.json artifact for details." >&2
          exit 1
