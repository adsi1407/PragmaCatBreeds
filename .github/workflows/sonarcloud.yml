name: SonarCloud Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for better analysis

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'  # Use latest stable version
        cache: true

    - name: Get dependencies
      run: |
        flutter pub get
        cd module/domain && flutter pub get
        cd ../infrastructure && flutter pub get

    - name: Run modular tests with coverage (matching your custom script)
      run: |
        # Clean previous coverage
        rm -rf coverage/
        find . -name "*.lcov" -delete
        
        # Create coverage directory
        mkdir -p coverage
        
        # Run main app tests with coverage (matching CI strategy - NO general test execution)
        # Note: We run specific test categories only, no general flutter test execution
        
        # Run domain module tests
        echo "🧪 Running domain module tests..."
        cd module/domain
        flutter test --coverage
        cd ../..
        
        # Run infrastructure module tests  
        echo "🧪 Running infrastructure module tests..."
        cd module/infrastructure
        flutter test --coverage
        cd ../..
        
        # Generate presentation-specific coverage by component type
        echo "🧪 Running presentation BLoC tests..."
        flutter test --coverage --tags=bloc --coverage-path=coverage/presentation-bloc.lcov || true
        
        echo "🧪 Running presentation widgets tests..."
        flutter test --coverage test/presentation/**/widgets --exclude-tags=golden,accessibility,bloc --coverage-path=coverage/presentation-widgets.lcov || true
        
        echo "🧪 Running presentation pages tests..."
        flutter test --coverage test/presentation/**/page --exclude-tags=golden,accessibility,bloc --coverage-path=coverage/presentation-pages.lcov || true
        
        # Optional: Run other test categories without coverage
        echo "🧪 Running additional test categories..."
        flutter test --tags=accessibility || true
        flutter test test/smoke/ || true  
        flutter test test/theme/ || true
        flutter test --tags=integration || true
        
        # Verify coverage files exist
        echo "📊 Coverage files generated:"
        ls -la coverage/ || true
        ls -la module/domain/coverage/ || true  
        ls -la module/infrastructure/coverage/ || true

    - name: Process coverage for SonarCloud modules
      run: |
        # Install lcov if available for processing
        sudo apt-get update && sudo apt-get install -y lcov || true
        
        # Create combined coverage for main analysis
        if command -v lcov &> /dev/null; then
          echo "📊 Processing coverage with lcov..."
          
          # Combine all coverage files (presentation-specific + modules)
          lcov --add-tracefile coverage/presentation-bloc.lcov \
               --add-tracefile coverage/presentation-widgets.lcov \
               --add-tracefile coverage/presentation-pages.lcov \
               --add-tracefile module/domain/coverage/lcov.info \
               --add-tracefile module/infrastructure/coverage/lcov.info \
               --output-file coverage/combined.lcov || true
               
          # Filter out generated files
          lcov --remove coverage/combined.lcov \
               '**/generated/**' \
               '**/l10n/**' \
               '**/test/**' \
               '**/build/**' \
               '**/.dart_tool/**' \
               '**/*.g.dart' \
               '**/*.freezed.dart' \
               '**/*.config.dart' \
               -o coverage/filtered.lcov || true
        fi
        
        echo "📁 Final coverage structure:"
        find . -name "*.lcov*" -o -name "lcov.info" | head -10

    - name: Debug coverage artifacts
      run: |
        echo "== Coverage files in workspace =="
        du -h coverage || true
        du -h module/domain/coverage || true
        du -h module/infrastructure/coverage || true

        echo "== Head of combined/filtered LCOV (if present) =="
        if [ -f coverage/combined.lcov ]; then
          echo "--- coverage/combined.lcov (first 50 lines) ---"
          head -n 50 coverage/combined.lcov || true
        else
          echo "coverage/combined.lcov not found"
        fi

        if [ -f coverage/filtered.lcov ]; then
          echo "--- coverage/filtered.lcov (first 50 lines) ---"
          head -n 50 coverage/filtered.lcov || true
        else
          echo "coverage/filtered.lcov not found"
        fi

        echo "== Content of module lcovs (first 20 lines) =="
        if [ -f module/domain/coverage/lcov.info ]; then
          echo "--- module/domain/coverage/lcov.info ---"
          head -n 20 module/domain/coverage/lcov.info || true
        fi
        if [ -f module/infrastructure/coverage/lcov.info ]; then
          echo "--- module/infrastructure/coverage/lcov.info ---"
          head -n 20 module/infrastructure/coverage/lcov.info || true
        fi

    - name: Normalize LCOV paths for Sonar
      run: |
        echo "== Normalizing coverage/filtered.lcov paths =="
        if [ -f coverage/filtered.lcov ]; then
          echo "coverage/filtered.lcov exists, checking for absolute paths..."
          if [ -n "$GITHUB_WORKSPACE" ]; then
            # Replace absolute GITHUB_WORKSPACE prefix with empty string to make paths repo-relative
            sed -i "s|$GITHUB_WORKSPACE/||g" coverage/filtered.lcov || true
            echo "Rewrote possible absolute paths using GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          else
            echo "GITHUB_WORKSPACE not set; skipping rewrite"
          fi
          echo "-- first 20 lines after normalization --"
          head -n 20 coverage/filtered.lcov || true
        else
          echo "coverage/filtered.lcov not found; Sonar may receive no coverage data"
        fi
        
        echo "== Mapping SF entries to module paths when necessary =="
        if [ -f coverage/filtered.lcov ]; then
          TMP_FILE="coverage/filtered.lcov.tmp"
          : > "$TMP_FILE"
          while IFS= read -r line || [ -n "$line" ]; do
            if [[ "$line" == SF:* ]]; then
              path="${line#SF:}"
              # prefer repo-root path
              if [ -f "$GITHUB_WORKSPACE/$path" ]; then
                echo "SF:$path" >> "$TMP_FILE"
              elif [ -f "$GITHUB_WORKSPACE/module/domain/$path" ]; then
                echo "SF:module/domain/$path" >> "$TMP_FILE"
              elif [ -f "$GITHUB_WORKSPACE/module/infrastructure/$path" ]; then
                echo "SF:module/infrastructure/$path" >> "$TMP_FILE"
              else
                # leave unchanged if we can't resolve
                echo "$line" >> "$TMP_FILE"
              fi
            else
              echo "$line" >> "$TMP_FILE"
            fi
          done < coverage/filtered.lcov
          mv "$TMP_FILE" coverage/filtered.lcov
          echo "Mapping complete. First 20 lines after mapping:"
          head -n 20 coverage/filtered.lcov || true
        else
          echo "coverage/filtered.lcov not found; skipping mapping"
        fi

    # No temporary presentation module creation - presentation analyzed as part of `lib/`

    - name: SonarCloud Scan with Module Support
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.organization=adsi1407
          -Dsonar.projectKey=adsi1407_PragmaCatBreeds
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.dart.coverage.reportPaths=module/domain/coverage/lcov.info,module/infrastructure/coverage/lcov.info,coverage/filtered.lcov
          -Dsonar.verbose=true

    - name: Comment PR with SonarCloud Results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const summary = `## 📊 SonarCloud Analysis Results
          
          🔍 **Modular Analysis Completed**
          - ✅ **Presentation Layer**: BLoC pattern coverage analyzed
          - ✅ **Domain Layer**: Clean architecture compliance checked  
          - ✅ **Infrastructure Layer**: External dependencies analyzed
          
          📈 **Coverage by Module:**
          - **Domain**: Target ≥90% (Clean Architecture core)
          - **Infrastructure**: Target ≥60% (External integrations)
          - **Presentation BLoC**: Target ≥50% (Business logic)
          - **Presentation Widgets**: Target ≥40% (UI components)
          
          🎯 **Quality Gates**: ${context.eventName === 'pull_request' ? 'Applied to PR changes' : 'Full analysis'}
          
          📊 View detailed results in [SonarCloud Dashboard](https://sonarcloud.io/project/overview?id=adsi1407_PragmaCatBreeds)`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: summary
          });

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-reports
        path: |
          coverage/
          module/domain/coverage/
          module/infrastructure/coverage/