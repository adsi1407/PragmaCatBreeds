name: Dependabot Auto-Retry

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  dependabot-retry:
    if: >
      (github.event_name == 'issue_comment' && github.event.issue && github.event.issue.pull_request) ||
      (github.event_name == 'pull_request_review_comment' && github.event.pull_request)
      && contains(github.event.comment.body, '@dependabot retry') &&
      github.event.comment.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - id: ensure_comment_is_on_a_pull_request
        name: Ensure comment is on a pull request
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            // Accept either issue_comment or pull_request_review_comment payloads
            const hasIssuePr = context.payload.issue && context.payload.issue.pull_request;
            const hasPr = !!context.payload.pull_request;
            if (!hasIssuePr && !hasPr) {
              // Not a PR comment
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: 'The `@dependabot retry` command must be posted on the Pull Request conversation. This comment appears to be outside a PR context; nothing to do.'
              });
              return 'false';
            }
            return 'true';

      - name: Dependabot metadata
        if: ${{ steps.ensure_comment_is_on_a_pull_request.outputs.result == 'true' && (github.event.issue.pull_request || github.event.pull_request) }}
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      
      - name: Enable auto-merge for Dependabot PRs
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url || github.event.issue.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔄 Retriggering checks for this Dependabot PR. Please wait for the pipeline to complete.'
            })