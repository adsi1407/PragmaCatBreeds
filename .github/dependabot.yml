version: 2
updates:
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "flutter"
    rebase-strategy: auto
    commit-message:
      prefix: "deps"
      include: "scope"
    reviewers:
      - "adsi1407"
    assignees:
      - "adsi1407"

  - package-ecosystem: "pub"
    directory: "/module/domain"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "domain"
      - "clean-architecture"
    rebase-strategy: auto
    commit-message:
      prefix: "deps(domain)"
      include: "scope"
    reviewers:
      - "adsi1407"

  - package-ecosystem: "pub"
    directory: "/module/infrastructure"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "11:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "infrastructure"
      - "clean-architecture"
    rebase-strategy: auto
    commit-message:
      prefix: "deps(infra)"
      include: "scope"
    reviewers:
      - "adsi1407"

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "ci-cd"
    commit-message:
      prefix: "deps(actions)"
      include: "scope"
