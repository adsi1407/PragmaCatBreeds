version: 2
updates:
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    rebase-strategy: auto

  - package-ecosystem: "pub"
    directory: "/module/domain"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    rebase-strategy: auto

  - package-ecosystem: "pub"
    directory: "/module/infrastructure"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    rebase-strategy: auto
