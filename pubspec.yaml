name: pragma_cat_breeds
description: "Cat breeds application implemented following Clean Architecture principles."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Local modules
  domain:
    path: module/domain
  infrastructure:
    path: module/infrastructure

  # State management
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5
  
  # Dependency injection
  injectable: ^2.4.1
  get_it: ^7.6.7
  
  # HTTP client
  dio: ^5.4.3+1
  
  # Splash Screen
  flutter_native_splash: ^2.4.0
  
  # UI components
  cached_network_image: ^3.3.1
  
  # Localization
  flutter_localizations:
    sdk: flutter
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Testing
  mocktail: ^1.0.3
  bloc_test: ^9.1.5
  
  # Code generation
  injectable_generator: ^2.4.1
  build_runner: ^2.4.8
  
  # Linting
  very_good_analysis: ^10.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  
  # Generate localization files
  generate: true
  
  assets:
    - assets/images/

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #

# Flutter Native Splash configuration
flutter_native_splash:
  color: "#1E1E1E"  # Pragma primary dark color
  image: assets/images/splash_logo.png
  color_dark: "#0066CC"  # Pragma blue for dark mode
  image_dark: assets/images/splash_logo_dark.png
  android: true
  ios: true
  web: true
  android_gravity: center
  ios_content_mode: center
  web_image_mode: center
  fullscreen: true
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
