rules:
  - id: possible-id-colombia
    languages: [generic]
    message: "Possible Colombian ID number (7-10 digits) found. Verify this is not sensitive PII."
    severity: WARNING
    patterns:
      - pattern-regex: '\b\d{7,10}\b'
    paths:
      exclude:
        - "*.pbxproj"
        - "*.gradle.kts"
        - "*.gradle"
        - "android/gradle.properties"
        - "android/settings.gradle.kts"
        - "ios/Runner.xcodeproj/**"
        - "macos/Runner.xcodeproj/**"
        - "**/build.gradle.kts"
        - "**/gradle-wrapper.properties"
    metadata:
      category: privacy
      recommended: true
